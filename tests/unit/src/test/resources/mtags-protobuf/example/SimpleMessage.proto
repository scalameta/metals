     bool active = 3;
//        ^^^^^^ definition example/Person#active(). METHOD(val)
//        ^^^^^^ definition example/Person#getActive(). METHOD(val)
//        ^^^^^^ definition example/Person#withActive(). METHOD(val)
   }

   message Address {
